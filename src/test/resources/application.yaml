spring:
  application:
    name: diet-formulator-test

  datasource:
    url: "jdbc:sqlite::memory:"
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.community.dialect.SQLiteDialect
