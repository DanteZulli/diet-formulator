<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${food.nombre != null ? food.nombre + ' - Diet Formulator' : 'Nuevo Alimento'}">Alimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .navbar-brand { font-weight: 600; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 th:text="${food.id != null} ? 'Editar Alimento' : 'Nuevo Alimento'">Alimento</h2>

        <form th:action="@{/foods}" th:object="${food}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="card mb-4">
                <div class="card-header"><h5>Datos del Alimento</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="tipo" class="form-label">Tipo</label>
                            <select class="form-select" id="tipo" th:field="*{tipo}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="t : ${tiposAlimento}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="porcion" class="form-label">Tamaño porción</label>
                            <input type="number" step="0.1" class="form-control" id="porcion" th:field="*{porcion}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="unidadPorcion" class="form-label">Unidad porción</label>
                            <select class="form-select" id="unidadPorcion" th:field="*{unidadPorcion}">
                                <option value="">Seleccionar...</option>
                                <option th:each="u : ${unidadesPorcion}" th:value="${u}" th:text="${u}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-primary">Guardar Alimento</button>
                <a th:href="@{/foods}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
