<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${food.name != null ? food.name + ' - Diet Formulator' : 'Nuevo Alimento'}">Alimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>body { background-color: #f8f9fa; } .navbar-brand { font-weight: 600; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h2 th:text="${food.id != null} ? 'Editar Alimento' : 'Nuevo Alimento'">Alimento</h2>

        <form th:action="@{/foods}" th:object="${food}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="card mb-4">
                <div class="card-header"><h5>Datos del Alimento</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label">Tipo</label>
                            <select class="form-select" id="type" th:field="*{type}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="t : ${foodTypes}" th:value="${t}" th:text="${t.displayName}"></option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="portion" class="form-label">Tamaño porción</label>
                            <input type="number" step="0.1" class="form-control" id="portion" th:field="*{portion}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="portionUnit" class="form-label">Unidad porción</label>
                            <select class="form-select" id="portionUnit" th:field="*{portionUnit}">
                                <option value="">Seleccionar...</option>
                                <option th:each="u : ${portionUnits}" th:value="${u}" th:text="${u.displayName}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4" th:each="entry : ${nutrientsByCategory}">
                <div class="card-header">
                    <h5 th:text="${entry.key.displayName}">Categoría</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-2" th:each="nutrient : ${entry.value}">
                            <label class="form-label" th:text="${nutrient.displayName}">Nutriente</label>
                            <div class="input-group">
                                <input type="number" step="0.01" class="form-control"
                                       th:name="'nutrients[' + ${nutrient.name} + ']'"
                                       th:value="${food.nutrients[nutrient.name]}">
                                <span class="input-group-text" th:text="${nutrient.unit}">g</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4" th:if="${!uncategorizedNutrients.isEmpty()}">
                <div class="card-header">
                    <h5>Otros</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-2" th:each="nutrient : ${uncategorizedNutrients}">
                            <label class="form-label" th:text="${nutrient.displayName}">Nutriente</label>
                            <div class="input-group">
                                <input type="number" step="0.01" class="form-control"
                                       th:name="'nutrients[' + ${nutrient.name} + ']'"
                                       th:value="${food.nutrients[nutrient.name]}">
                                <span class="input-group-text" th:text="${nutrient.unit}">g</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-primary">Guardar Alimento</button>
                <a th:href="@{/foods}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
