<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos - Diet Formulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>body { background-color: #f8f9fa; } .navbar-brand { font-weight: 600; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Alimentos</h2>
            <a th:href="@{/foods/new}" class="btn btn-primary">Nuevo Alimento</a>
        </div>

        <form th:action="@{/foods}" method="get" class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" name="search" placeholder="Buscar alimento..."
                       th:value="${search}">
                <button type="submit" class="btn btn-outline-secondary">Buscar</button>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(foods)}" class="alert alert-info">
            No hay alimentos registrados.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(foods)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Porción</th>
                        <th>Unidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="food : ${foods}">
                        <td th:text="${food.name}"></td>
                        <td th:text="${food.type.displayName}"></td>
                        <td th:text="${food.portion}"></td>
                        <td th:text="${food.portionUnit?.displayName}"></td>
                        <td>
                            <a th:href="@{/foods/{id}/edit(id=${food.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                            <form th:action="@{/foods/{id}/delete(id=${food.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar este alimento?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
