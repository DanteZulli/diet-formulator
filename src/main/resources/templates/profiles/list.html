<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Formulador de Dietas' : 'Formulador de Dietas'}">Formulador de Dietas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/dog-pawprint-on-a-heart-svgrepo-com.svg}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}"><img src="/dog-pawprint-on-a-heart-svgrepo-com.svg" alt="" width="28" height="28" class="me-2">Formulador de Dietas</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Perfiles de Animales</h2>
            <a th:href="@{/profiles/new}" class="btn btn-primary">Nuevo Perfil</a>
        </div>

        <div th:if="${#lists.isEmpty(profiles)}" class="alert alert-info">
            No hay perfiles creados. Creá uno nuevo para empezar.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(profiles)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Especie</th>
                        <th>Etapa</th>
                        <th>Peso (kg)</th>
                        <th>Edad</th>
                        <th>Actividad</th>
                        <th>kcal/día</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="profile : ${profiles}">
                        <td th:text="${profile.name}"></td>
                        <td th:text="${profile.species.displayName}"></td>
                        <td th:text="${profile.lifeStage.displayName}"></td>
                        <td th:text="${#numbers.formatDecimal(profile.weightKg, 1, 2)}"></td>
                        <td>
                            <span th:if="${profile.ageMonths != null and profile.ageMonths >= 12}"
                                  th:text="${profile.ageMonths / 12} + ' años'"></span>
                            <span th:if="${profile.ageMonths != null and profile.ageMonths < 12}"
                                  th:text="${profile.ageMonths} + ' meses'"></span>
                        </td>
                        <td th:text="${profile.activityLevel.displayName}"></td>
                        <td th:text="${#numbers.formatDecimal(profile.recommendedCaloricIntake, 1, 1)}"></td>
                        <td>
                            <a th:href="@{/profiles/{id}/edit(id=${profile.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                            <form th:action="@{/profiles/{id}/delete(id=${profile.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar este perfil?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
