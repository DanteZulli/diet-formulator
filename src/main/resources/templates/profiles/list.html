<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Diet Formulator' : 'Diet Formulator'}">Diet Formulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
    </style>
</head>
<body>
    <!-- Navigation bar / Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Error alert / Alerta de error -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Perfiles de Animales</h2>
            <a th:href="@{/profiles/new}" class="btn btn-primary">Nuevo Perfil</a>
        </div>

        <div th:if="${#lists.isEmpty(profiles)}" class="alert alert-info">
            No hay perfiles creados. Creá uno nuevo para empezar.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(profiles)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Especie</th>
                        <th>Etapa</th>
                        <th>Peso (kg)</th>
                        <th>Edad</th>
                        <th>Actividad</th>
                        <th>kcal/día</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="profile : ${profiles}">
                        <td th:text="${profile.nombre}"></td>
                        <td th:text="${profile.especie}"></td>
                        <td th:text="${profile.lifeStage}"></td>
                        <td th:text="${#numbers.formatDecimal(profile.pesoKg, 1, 2)}"></td>
                        <td>
                            <span th:if="${profile.edadMeses >= 12}"
                                  th:text="${profile.edadMeses / 12} + ' años'"></span>
                            <span th:if="${profile.edadMeses < 12}"
                                  th:text="${profile.edadMeses} + ' meses'"></span>
                        </td>
                        <td th:text="${profile.nivelActividad}"></td>
                        <td th:text="${#numbers.formatDecimal(profile.ingestaCaloricaRecomendada, 1, 1)}"></td>
                        <td>
                            <a th:href="@{/profiles/{id}/edit(id=${profile.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                            <form th:action="@{/profiles/{id}/delete(id=${profile.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar este perfil?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
