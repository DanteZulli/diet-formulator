<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profile.id != null} ? 'Editar Perfil - Diet Formulator' : 'Nuevo Perfil - Diet Formulator'">Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h2 th:text="${profile.id != null} ? 'Editar Perfil' : 'Nuevo Perfil'">Perfil</h2>

        <form th:action="@{/profiles}" th:object="${profile}" method="post" class="needs-validation" novalidate>
            <input type="hidden" th:field="*{id}">

            <div class="card mb-4">
                <div class="card-header"><h5>Datos del Animal</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="species" class="form-label">Especie</label>
                            <select class="form-select" id="species" th:field="*{species}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="s : ${species}" th:value="${s}" th:text="${s.displayName}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lifeStage" class="form-label">Etapa de Vida</label>
                            <select class="form-select" id="lifeStage" th:field="*{lifeStage}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="ls : ${lifeStages}" th:value="${ls}" th:text="${ls.displayName}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="breed" class="form-label">Raza</label>
                            <input type="text" class="form-control" id="breed" th:field="*{breed}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="weightKg" class="form-label">Peso (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="weightKg" th:field="*{weightKg}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ageMonths" class="form-label">Edad (meses)</label>
                            <input type="number" class="form-control" id="ageMonths" th:field="*{ageMonths}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="bodyCondition" class="form-label">Condición Corporal (1-5)</label>
                            <input type="number" min="1" max="5" class="form-control" id="bodyCondition" th:field="*{bodyCondition}" required>
                        </div>
                        <div class="col-md-4 mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="blackCoat" th:field="*{blackCoat}">
                            <label class="form-check-label" for="blackCoat">Tiene el pelo negro</label>
                        </div>
                        <div class="col-md-4 mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="overweight" th:field="*{overweight}">
                            <label class="form-check-label" for="overweight">Tiene sobrepeso (gatos)</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4" id="puppySection" style="display: none;">
                <div class="card-header"><h5>Datos de Cachorro</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="adultWeightPuppy" class="form-label">Peso de Adulto (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="adultWeightPuppy" th:field="*{adultWeightPuppy}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4" id="lactationSection" style="display: none;">
                <div class="card-header"><h5>Datos de Lactancia</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="puppyCount" class="form-label">Número de Cachorros</label>
                            <input type="number" min="1" class="form-control" id="puppyCount" th:field="*{puppyCount}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lactationWeeks" class="form-label">Semanas de Lactancia (1-4)</label>
                            <input type="number" min="1" max="4" class="form-control" id="lactationWeeks" th:field="*{lactationWeeks}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header"><h5>Requisitos Energéticos</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="activityLevel" class="form-label">Nivel de Actividad</label>
                            <select class="form-select" id="activityLevel" th:field="*{activityLevel}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="al : ${activityLevels}" th:value="${al}" th:text="${al.displayName}"></option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="atIdealWeight" th:field="*{atIdealWeight}">
                            <label class="form-check-label" for="atIdealWeight">Está en su peso ideal</label>
                        </div>
                        <div class="col-md-3 mb-3" id="idealWeightSection" style="display: none;">
                            <label for="idealWeightKg" class="form-label">Peso Ideal (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="idealWeightKg" th:field="*{idealWeightKg}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ingesta Calórica Recomendada (kcal/día)</label>
                            <input type="hidden" id="recommendedCaloricIntakeHidden" th:field="*{recommendedCaloricIntake}">
                            <input type="text" class="form-control bg-light" id="recommendedIntake"
                                   th:value="${profile.recommendedCaloricIntake != null ? #numbers.formatDecimal(profile.recommendedCaloricIntake, 1, 2) : ''}"
                                   readonly>
                            <small class="text-muted">Calculada automáticamente</small>
                        </div>
                        <div class="col-md-3 mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="useRecommendedIntake" th:field="*{useRecommendedIntake}">
                            <label class="form-check-label" for="useRecommendedIntake">Usar ingesta recomendada</label>
                        </div>
                        <div class="col-md-3 mb-3" id="customIntakeSection" style="display: none;">
                            <label for="customCaloricIntake" class="form-label">Ingesta Calórica Custom (kcal/día)</label>
                            <input type="number" step="0.1" class="form-control" id="customCaloricIntake" th:field="*{customCaloricIntake}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header"><h5>Objetivos de Macronutrientes</h5></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="proteinPct" class="form-label">Proteína (%)</label>
                            <input type="range" min="0" max="100" class="form-range" id="proteinPct"
                                   th:field="*{macronutrientTargets.proteinPct}" oninput="document.getElementById('proteinVal').textContent = this.value + '%'">
                            <span id="proteinVal" th:text="${profile.macronutrientTargets?.proteinPct != null ? profile.macronutrientTargets.proteinPct + '%' : '0%'}"></span>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fatPct" class="form-label">Grasa (%)</label>
                            <input type="range" min="0" max="100" class="form-range" id="fatPct"
                                   th:field="*{macronutrientTargets.fatPct}" oninput="document.getElementById('fatVal').textContent = this.value + '%'">
                            <span id="fatVal" th:text="${profile.macronutrientTargets?.fatPct != null ? profile.macronutrientTargets.fatPct + '%' : '0%'}"></span>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="carbohydratePct" class="form-label">Carbohidratos (%)</label>
                            <input type="range" min="0" max="100" class="form-range" id="carbohydratePct"
                                   th:field="*{macronutrientTargets.carbohydratePct}" oninput="document.getElementById('carbVal').textContent = this.value + '%'">
                            <span id="carbVal" th:text="${profile.macronutrientTargets?.carbohydratePct != null ? profile.macronutrientTargets.carbohydratePct + '%' : '0%'}"></span>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fiberMsPct" class="form-label">Fibra %MS (%)</label>
                            <input type="range" min="0" max="100" class="form-range" id="fiberMsPct"
                                   th:field="*{macronutrientTargets.fiberMsPct}" oninput="document.getElementById('fiberVal').textContent = this.value + '%'">
                            <span id="fiberVal" th:text="${profile.macronutrientTargets?.fiberMsPct != null ? profile.macronutrientTargets.fiberMsPct + '%' : '0%'}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header"><h5>Motivo de la Consulta</h5></div>
                <div class="card-body">
                    <textarea class="form-control" rows="3" th:field="*{notes}"
                              placeholder="Notas libres sobre la consulta..."></textarea>
                </div>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-primary">Guardar Perfil</button>
                <a th:href="@{/profiles}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var lifeStageSelect = document.getElementById('lifeStage');
            var atIdealWeightCheck = document.getElementById('atIdealWeight');
            var useRecommendedCheck = document.getElementById('useRecommendedIntake');
            var recommendedIntakeInput = document.getElementById('recommendedIntake');
            var recommendedIntakeHidden = document.getElementById('recommendedCaloricIntakeHidden');

            function toggleSections() {
                var stage = lifeStageSelect.value;
                document.getElementById('puppySection').style.display = stage === 'PUPPY' ? 'block' : 'none';
                document.getElementById('lactationSection').style.display = stage === 'LACTATING' ? 'block' : 'none';
                document.getElementById('idealWeightSection').style.display = atIdealWeightCheck.checked ? 'none' : 'block';
                document.getElementById('customIntakeSection').style.display = useRecommendedCheck.checked ? 'none' : 'block';
            }

            function calculateIntake() {
                var species = document.getElementById('species').value;
                var lifeStage = lifeStageSelect.value;
                var weightKg = document.getElementById('weightKg').value;
                var ageMonths = document.getElementById('ageMonths').value;
                var activityLevel = document.getElementById('activityLevel').value;

                if (!species || !lifeStage || !weightKg || !ageMonths || !activityLevel) {
                    recommendedIntakeInput.value = '';
                    return;
                }

                var params = new URLSearchParams({
                    species: species,
                    lifeStage: lifeStage,
                    weightKg: weightKg,
                    ageMonths: ageMonths,
                    activityLevel: activityLevel,
                    atIdealWeight: atIdealWeightCheck.checked
                });

                if (!atIdealWeightCheck.checked) {
                    var idealWeight = document.getElementById('idealWeightKg').value;
                    if (idealWeight) params.append('idealWeightKg', idealWeight);
                }

                if (lifeStage === 'LACTATING') {
                    var puppyCount = document.getElementById('puppyCount').value;
                    var lactationWeeks = document.getElementById('lactationWeeks').value;
                    if (puppyCount) params.append('puppyCount', puppyCount);
                    if (lactationWeeks) params.append('lactationWeeks', lactationWeeks);
                }

                fetch('/profiles/api/calculate-intake?' + params.toString())
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.recommendedIntake !== undefined) {
                            var value = data.recommendedIntake.toFixed(2);
                            recommendedIntakeInput.value = value;
                            recommendedIntakeHidden.value = data.recommendedIntake;
                        } else if (data.error) {
                            recommendedIntakeInput.value = '';
                            recommendedIntakeHidden.value = '';
                        }
                    })
                    .catch(function() {
                        recommendedIntakeInput.value = '';
                    });
            }

            var intakeFields = ['species', 'lifeStage', 'weightKg', 'ageMonths', 'activityLevel',
                                'atIdealWeight', 'idealWeightKg', 'puppyCount', 'lactationWeeks'];
            intakeFields.forEach(function(fieldId) {
                var el = document.getElementById(fieldId);
                if (el) {
                    el.addEventListener('change', calculateIntake);
                    el.addEventListener('input', calculateIntake);
                }
            });

            lifeStageSelect.addEventListener('change', toggleSections);
            atIdealWeightCheck.addEventListener('change', toggleSections);
            useRecommendedCheck.addEventListener('change', toggleSections);

            toggleSections();

            if (recommendedIntakeInput.value === '') {
                calculateIntake();
            }
        });
    </script>
</body>
</html>
