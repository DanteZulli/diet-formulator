<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${diet?.name + ' - Diet Formulator'}">Dieta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        table.table td.nutrient-adequate { color: #198754 !important; font-weight: bold; }
        table.table td.nutrient-excess { color: #dc3545 !important; font-weight: bold; }
        table.table td.nutrient-below { color: #000 !important; font-weight: bold; }
        .section-header { background-color: #e9ecef; font-weight: 600; }
        .category-header td { background-color: #dee2e6; font-weight: 700; font-size: 0.9rem; }
        .nutrient-unit { color: #6c757d; font-size: 0.85em; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 th:text="${diet.name}">Dieta</h2>
                <p class="text-muted mb-0">
                    Perfil: <span th:text="${diet.animalProfile.name}"></span> |
                    Edad: <span th:text="${diet.animalProfile.ageMonths}"></span> meses |
                    Peso: <span th:text="${#numbers.formatDecimal(diet.animalProfile.weightKg, 1, 2)}"></span> kg
                </p>
            </div>
            <div>
                <a th:href="@{/diets}" class="btn btn-outline-secondary">Volver</a>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><h5>Agregar Alimento</h5></div>
            <div class="card-body">
                <form th:action="@{/diets/{id}/items(id=${diet.id})}" method="post">
                    <div class="row">
                        <div class="col-md-4">
                            <label for="foodId" class="form-label">Alimento</label>
                            <select class="form-select" id="foodId" name="foodId" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="food : ${allFoods}" th:value="${food.id}" th:text="${food.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="quantity" class="form-label">Cantidad</label>
                            <input type="number" step="0.1" class="form-control" id="quantity" name="quantity" required>
                        </div>
                        <div class="col-md-2">
                            <label for="unit" class="form-label">Unidad</label>
                            <select class="form-select" id="unit" name="unit" required>
                                <option th:each="u : ${quantityUnits}" th:value="${u}" th:text="${u.displayName}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="cookingMethod" class="form-label">Cocción (opcional)</label>
                            <input type="text" class="form-control" id="cookingMethod" name="cookingMethod"
                                   placeholder="Ej: Cocido a fuego lento">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary">+</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4" th:if="${!#lists.isEmpty(diet.items)}">
            <div class="card-header"><h5>Ingredientes</h5></div>
            <div class="card-body">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Alimento</th>
                            <th>Cantidad</th>
                            <th>Unidad</th>
                            <th>Cocción</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${diet.items}">
                            <td th:text="${item.food.name}"></td>
                            <td th:text="${#numbers.formatDecimal(item.quantity, 1, 2)}"></td>
                            <td th:text="${item.unit.displayName}"></td>
                            <td th:text="${item.cookingMethod}"></td>
                            <td>
                                <form th:action="@{/diets/{dietId}/items/{itemId}/delete(dietId=${diet.id}, itemId=${item.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">X</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><h5>Tabla de Nutrientes</h5></div>
            <div class="card-body table-responsive">
                <table class="table table-sm table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Nutriente</th>
                            <th class="text-end">Objetivo (NRC)</th>
                            <th class="text-end">Total</th>
                            <th class="text-end">% Objetivo</th>
                            <th class="text-end">Limite Seguro</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="cat : ${T(ar.dantezulli.diet_formulator.model.enums.NutrientCategory).values()}">
                            <tr class="category-header">
                                <td colspan="5" th:text="${cat.displayName}"></td>
                            </tr>
                            <tr th:each="nutrient : ${nutrients}" th:if="${nutrient.category == cat}"
                                th:with="s=${summary.get(nutrient)}">
                                <td th:text="${nutrient.displayName}"></td>
                                <td class="text-end">
                                    <span th:if="${s.target != null}" th:text="${#numbers.formatDecimal(s.target, 1, 2)}"></span>
                                    <span th:if="${s.target == null}">-</span>
                                    <span class="nutrient-unit" th:if="${s.target != null}" th:text="${nutrient.unit}"></span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${#numbers.formatDecimal(s.total, 1, 2)}"></span>
                                    <span class="nutrient-unit" th:text="${nutrient.unit}"></span>
                                </td>
                                <td class="text-end"
                                    th:text="${s.pctTarget != null ? #numbers.formatDecimal(s.pctTarget, 1, 0) + '%' : '-'}"
                                    th:class="${s.level != null ? ('text-end nutrient-' + s.level.cssClass) : 'text-end'}">
                                </td>
                                <td class="text-end">
                                    <span th:if="${s.sul != null}" th:text="${#numbers.formatDecimal(s.sul, 1, 2)}"></span>
                                    <span th:if="${s.sul == null}">-</span>
                                    <span class="nutrient-unit" th:if="${s.sul != null}" th:text="${nutrient.unit}"></span>
                                </td>
                            </tr>
                        </th:block>
                        <th:block>
                            <tr class="category-header">
                                <td colspan="5">Sin categoría</td>
                            </tr>
                            <tr th:each="nutrient : ${nutrients}" th:if="${nutrient.category == null}"
                                th:with="s=${summary.get(nutrient)}">
                                <td th:text="${nutrient.displayName}"></td>
                                <td class="text-end">
                                    <span th:if="${s.target != null}" th:text="${#numbers.formatDecimal(s.target, 1, 2)}"></span>
                                    <span th:if="${s.target == null}">-</span>
                                    <span class="nutrient-unit" th:if="${s.target != null}" th:text="${nutrient.unit}"></span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${#numbers.formatDecimal(s.total, 1, 2)}"></span>
                                    <span class="nutrient-unit" th:text="${nutrient.unit}"></span>
                                </td>
                                <td class="text-end"
                                    th:text="${s.pctTarget != null ? #numbers.formatDecimal(s.pctTarget, 1, 0) + '%' : '-'}"
                                    th:class="${s.level != null ? ('text-end nutrient-' + s.level.cssClass) : 'text-end'}">
                                </td>
                                <td class="text-end">
                                    <span th:if="${s.sul != null}" th:text="${#numbers.formatDecimal(s.sul, 1, 2)}"></span>
                                    <span th:if="${s.sul == null}">-</span>
                                    <span class="nutrient-unit" th:if="${s.sul != null}" th:text="${nutrient.unit}"></span>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
