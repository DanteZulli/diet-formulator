<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${diet.nombre + ' - Diet Formulator'}">Dieta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        .nutrient-green { color: #198754; font-weight: bold; }
        .nutrient-red { color: #dc3545; font-weight: bold; }
        .nutrient-black { color: #000; }
        .section-header { background-color: #e9ecef; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Diet header / Encabezado de dieta -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 th:text="${diet.nombre}">Dieta</h2>
                <p class="text-muted mb-0">
                    Perfil: <span th:text="${diet.animalProfile.nombre}"></span> |
                    Edad: <span th:text="${diet.animalProfile.edadMeses}"></span> meses |
                    Peso: <span th:text="${#numbers.formatDecimal(diet.animalProfile.pesoKg, 1, 2)}"></span> kg
                </p>
            </div>
            <div>
                <a th:href="@{/diets}" class="btn btn-outline-secondary">Volver</a>
            </div>
        </div>

        <!-- Add food item form / Formulario para agregar ítem de alimento -->
        <div class="card mb-4">
            <div class="card-header"><h5>Agregar Alimento</h5></div>
            <div class="card-body">
                <form th:action="@{/diets/{id}/items(id=${diet.id})}" method="post">
                    <div class="row">
                        <div class="col-md-4">
                            <label for="foodId" class="form-label">Alimento</label>
                            <select class="form-select" id="foodId" name="foodId" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="food : ${allFoods}" th:value="${food.id}" th:text="${food.nombre}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="cantidad" class="form-label">Cantidad</label>
                            <input type="number" step="0.1" class="form-control" id="cantidad" name="cantidad" required>
                        </div>
                        <div class="col-md-2">
                            <label for="unidad" class="form-label">Unidad</label>
                            <select class="form-select" id="unidad" name="unidad" required>
                                <option th:each="u : ${unidadesCantidad}" th:value="${u}" th:text="${u}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="tipoCoccion" class="form-label">Cocción (opcional)</label>
                            <input type="text" class="form-control" id="tipoCoccion" name="tipoCoccion"
                                   placeholder="Ej: Cocido a fuego lento">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary">+</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Current items / Ítems actuales -->
        <div class="card mb-4" th:if="${!#lists.isEmpty(diet.items)}">
            <div class="card-header"><h5>Ingredientes</h5></div>
            <div class="card-body">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Alimento</th>
                            <th>Cantidad</th>
                            <th>Unidad</th>
                            <th>Cocción</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${diet.items}">
                            <td th:text="${item.food.nombre}"></td>
                            <td th:text="${#numbers.formatDecimal(item.cantidad, 1, 2)}"></td>
                            <td th:text="${item.unidad}"></td>
                            <td th:text="${item.tipoCoccion}"></td>
                            <td>
                                <form th:action="@{/diets/{dietId}/items/{itemId}/delete(dietId=${diet.id}, itemId=${item.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">X</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Nutrient table / Tabla de nutrientes -->
        <div class="card mb-4">
            <div class="card-header"><h5>Tabla de Nutrientes</h5></div>
            <div class="card-body table-responsive">
                <table class="table table-sm table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Nutriente</th>
                            <th class="text-end">Objetivo</th>
                            <th class="text-end">Total</th>
                            <th class="text-end">% MS</th>
                            <th class="text-end">% Objetivo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="nutrient : ${nutrients}" th:with="s=${summary.get(nutrient)}">
                            <td th:text="${nutrient.displayName}"></td>
                            <td class="text-end" th:text="${s.target != null ? #numbers.formatDecimal(s.target, 1, 2) : ''}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(s.total, 1, 2)}"></td>
                            <td class="text-end" th:text="${s.total > 0 ? #numbers.formatDecimal(s.total, 1, 2) + '%' : ''}"></td>
                            <td class="text-end"
                                th:text="${s.pctTarget != null ? #numbers.formatDecimal(s.pctTarget, 1, 0) + '%' : ''}"
                                th:class="${s.pctTarget != null ? (s.pctTarget < 80 ? 'text-danger' : s.pctTarget <= 120 ? 'text-success' : 'text-danger') : ''}">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
