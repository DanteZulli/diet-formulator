<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${diet?.name != null ? diet.name + ' - Formulador de Dietas' : 'Nueva Dieta'}">Dieta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/dog-pawprint-on-a-heart-svgrepo-com.svg}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}"><img src="/dog-pawprint-on-a-heart-svgrepo-com.svg" alt="" width="28" height="28" class="me-2">Formulador de Dietas</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h2 th:text="${isNew} ? 'Nueva Dieta' : 'Editar Dieta'">Dieta</h2>

        <form th:action="@{/diets}" th:object="${diet}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Nombre de la Dieta</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                </div>
                <div class="col-md-6">
                    <label for="profileId" class="form-label">Perfil del Animal</label>
                    <select class="form-select" name="animalProfileId" id="profileId" required>
                        <option value="">Seleccionar perfil...</option>
                        <option th:each="p : ${profiles}" th:value="${p.id}" th:text="${p.name + ' (' + p.species.displayName + ')'}"
                                th:selected="${diet.animalProfileId != null and diet.animalProfileId == p.id}"></option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Crear Dieta</button>
            <a th:href="@{/diets}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
