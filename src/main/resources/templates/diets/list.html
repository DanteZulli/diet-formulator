<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietas - Diet Formulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>body { background-color: #f8f9fa; } .navbar-brand { font-weight: 600; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}">Diet Formulator</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Dietas</h2>
            <a th:href="@{/diets/new}" class="btn btn-primary">Nueva Dieta</a>
        </div>

        <div th:if="${#lists.isEmpty(diets)}" class="alert alert-info">
            No hay dietas creadas. Creá una nueva para empezar.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(diets)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Perfil</th>
                        <th>Ítems</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="diet : ${diets}">
                        <td><a th:href="@{/diets/{id}(id=${diet.id})}" th:text="${diet.name}"></a></td>
                        <td th:text="${diet.animalProfile.name}"></td>
                        <td th:text="${#lists.size(diet.items)}"></td>
                        <td th:text="${#temporals.format(diet.createdAt, 'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/diets/{id}(id=${diet.id})}" class="btn btn-sm btn-outline-primary">Ver</a>
                            <form th:action="@{/diets/{id}/delete(id=${diet.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar esta dieta?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
