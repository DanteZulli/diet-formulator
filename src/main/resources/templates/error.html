<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Formulador de Dietas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-card { max-width: 700px; margin: 40px auto; }
        .error-status { font-size: 4rem; font-weight: 700; color: #dc3545; }
        .error-message { font-size: 1.1rem; color: #6c757d; }
        .exception-block { background: var(--pw-50); border: 1px solid var(--pw-300); border-radius: 6px; padding: 16px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
    </style>
    <link rel="icon" type="image/svg+xml" th:href="@{/dog-pawprint-on-a-heart-svgrepo-com.svg}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/profiles}"><img src="/dog-pawprint-on-a-heart-svgrepo-com.svg" alt="" width="28" height="28" class="me-2">Formulador de Dietas</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/profiles}">Perfiles</a>
                <a class="nav-link" th:href="@{/foods}">Alimentos</a>
                <a class="nav-link" th:href="@{/diets}">Dietas</a>
                <a class="nav-link" th:href="@{/docs.html}">Documentación</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="error-card card">
            <div class="card-body text-center">
                <div class="error-status" th:text="${status}">500</div>
                <h3 class="mb-2" th:text="${error}">Error</h3>
                <p class="error-message" th:text="${message}">Ocurrió un error inesperado.</p>

                <div th:if="${exception != null}" class="text-start mt-4">
                    <h6 class="text-muted mb-2">Detalle de la excepción:</h6>
                    <div class="exception-block" th:text="${exception}"></div>
                </div>

                <div class="mt-4">
                    <a th:href="@{/profiles}" class="btn btn-primary">Volver al inicio</a>
                    <button onclick="history.back()" class="btn btn-outline-secondary">Volver atrás</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
