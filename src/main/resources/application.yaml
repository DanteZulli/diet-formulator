spring:
  application:
    name: diet-formulator

  datasource:
    url: jdbc:h2:file:./data/diet-formulator
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
